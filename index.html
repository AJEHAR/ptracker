<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="pTracker">
  <meta name="application-name" content="pTracker">
  <meta name="theme-color" content="#e53e3e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>pTracker</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #f1f5f9;
      overflow: hidden;
      touch-action: manipulation;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    src="https://script.google.com/macros/s/AKfycbx3WrEmO6aS7D5_U8_X_exO-4Y6ploWblDytgoX5Snb5HuWLXA0ZzZ-BeuBMfKfGddh/exec"
    allowfullscreen>
  </iframe>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/pTracker/sw.js')
          .then(r => console.log('[ptracker] SW:', r.scope))
          .catch(e => console.warn('[ptracker] SW fail:', e));
      });
    }
  </script>
</body>
</html>
